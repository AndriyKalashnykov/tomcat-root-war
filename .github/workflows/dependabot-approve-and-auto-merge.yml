# https://blog.somewhatabstract.com/2021/10/11/setting-up-dependabot-with-github-actions-to-approve-and-merge/

name: Dependabot Pull Request Approve and Merge

on: pull_request_target

permissions:
  pull-requests: write
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:

      matrix:
        include:
          # Tomcat 9 (javax.servlet, Servlet 4.0) - compiler target 11
          - java: '11'
            java-distro: 'temurin'
            maven_profile: 'tomcat9'
          - java: '18'
            java-distro: 'temurin'
            maven_profile: 'tomcat9'
          - java: '25'
            java-distro: 'temurin'
            maven_profile: 'tomcat9'
          # Tomcat 10 (jakarta.servlet, Servlet 6.0) - compiler target 17
          - java: '18'
            java-distro: 'temurin'
            maven_profile: 'tomcat10'
          - java: '25'
            java-distro: 'temurin'
            maven_profile: 'tomcat10'
          # Tomcat 11 (jakarta.servlet, Servlet 6.1) - compiler target 21
          - java: '25'
            java-distro: 'temurin'
            maven_profile: 'tomcat11'

    steps:

      - uses: actions/checkout@v6

      - name: "Set up JDK ${{ matrix.java }} (${{ matrix.java-distro }})"
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.java-distro }}
          cache: 'maven'

      - name: "Build with Maven (${{ matrix.maven_profile }})"
        run: mvn -B package -P${{ matrix.maven_profile }} --file pom.xml

  dependabot:
    runs-on: ubuntu-latest
    needs: [ build ]
    # Checking the actor will prevent your Action run failing on non-Dependabot
    # PRs but also ensures that it only does work for Dependabot PRs.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      # This first step will fail if there's no metadata and so the approval
      # will not occur.
      - name: Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2.5.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      # Here the PR gets approved.
      - name: Approve a PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Finally, this sets the PR to allow auto-merging for patch and minor
      # updates if all checks pass
      - name: Enable auto-merge for Dependabot PRs
        if: ${{ github.event.workflow_run.conclusion == 'success' && !contains(steps.metadata.outputs.dependency-names, 'jetty-maven-plugin') && steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
