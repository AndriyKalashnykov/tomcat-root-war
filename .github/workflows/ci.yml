name: CI

on:

  push:
    branches: [ master ]
    tags: [ 'v*' ]

  pull_request:
    branches: [ master ]

  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Tag pushes always run the full pipeline: the tag SHA usually equals
      # master HEAD, so paths-filter (base: master) would see an empty diff and
      # skip every gated job, silently leaving a tagged release un-verified.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # `base` is ignored on pull_request events (PR base is implicit) and
          # required for push events / local `act` runs.
          base: ${{ github.event_name == 'push' && 'master' || '' }}
          filters: |
            code:
              - 'src/**'
              - 'pom.xml'
              - 'Makefile'
              - '.mise.toml'
              - '.github/workflows/ci.yml'
              # CLAUDE.md is project config (build conventions / skill mappings),
              # not docs — its edits MUST run CI (/ci-workflow §15c).
              - 'CLAUDE.md'
            # README.md carries a ```mermaid diagram. A README-only edit is NOT
            # `code` (it must not trigger the 11-leg build), but it still needs
            # mermaid-lint so a broken diagram can't merge unvalidated.
            docs:
              - 'README.md'

  static-check:

    needs: [ changes ]
    if: ${{ needs.changes.outputs.code == 'true' }}

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

    - name: Set up mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        install: true
        cache: true

    - name: Static check
      run: make static-check

  build:

    # Gate the expensive 11-leg matrix behind the cheap static-check job so a
    # lint/trivy/gitleaks failure fails fast before burning matrix runner minutes.
    needs: [ changes, static-check ]
    if: ${{ needs.changes.outputs.code == 'true' }}

    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:

      matrix:
        include:
          # Tomcat 9 (javax.servlet, Servlet 4.0) - compiler release 11
          - java: '11'
            maven_profile: 'tomcat9'
          - java: '17'
            maven_profile: 'tomcat9'
          - java: '18'
            maven_profile: 'tomcat9'
          - java: '21'
            maven_profile: 'tomcat9'
          - java: '25'
            maven_profile: 'tomcat9'
          # Tomcat 10 (jakarta.servlet, Servlet 6.1) - compiler release 17
          - java: '17'
            maven_profile: 'tomcat10'
          - java: '18'
            maven_profile: 'tomcat10'
          - java: '25'
            maven_profile: 'tomcat10'
          # Tomcat 11 (jakarta.servlet, Servlet 6.1) - compiler release 21
          - java: '21'
            maven_profile: 'tomcat11'
          - java: '25'
            maven_profile: 'tomcat11'

    env:
      # Override the .mise.toml java pin per matrix leg (mise resolves the
      # partial version to the latest Temurin of that major).
      MISE_JAVA_VERSION: temurin-${{ matrix.java }}

    steps:

    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

    - name: Set up mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        install: true
        # cache disabled: MISE_JAVA_VERSION differs per matrix leg while the
        # .mise.toml hash (the cache key) is identical across legs.
        cache: false

    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Lint
      run: make lint PROFILE=${{ matrix.maven_profile }}

    - name: Build
      run: make build PROFILE=${{ matrix.maven_profile }}

    - name: Test
      run: make test PROFILE=${{ matrix.maven_profile }}

  mermaid-lint:

    # When code changed, static-check already runs mermaid-lint. This job covers
    # docs-only edits (README.md) so a broken Mermaid diagram cannot merge
    # unvalidated (/ci-workflow §15h). Uses docker directly — no mise needed.
    needs: [ changes ]
    if: ${{ needs.changes.outputs.docs == 'true' && needs.changes.outputs.code != 'true' }}

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

    - name: Lint Mermaid diagrams
      run: make mermaid-lint

  smoke:

    # Deployed-WAR smoke test: boots ROOT.war under embedded Jetty and curls the
    # real endpoints. Catches the JSP runtime-compile + servlet-forward + deploy
    # contract (javax vs jakarta) regressions that `mvn package` + unit tests
    # never exercise (JSPs compile in the container at request time, not at build).
    needs: [ changes, static-check ]
    if: ${{ needs.changes.outputs.code == 'true' }}

    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        maven_profile: [ tomcat9, tomcat10, tomcat11 ]

    steps:

    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

    - name: Set up mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        install: true
        cache: true

    - name: Smoke test
      run: make smoke PROFILE=${{ matrix.maven_profile }}

  ci-pass:
    if: always()
    needs: [ changes, static-check, build, mermaid-lint, smoke ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
