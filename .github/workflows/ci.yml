name: CI

on:

  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:

      matrix:
        include:
          # Tomcat 9 (javax.servlet, Servlet 4.0) - compiler target 11
          - java: '11'
            java-distro: 'temurin'
            maven_profile: 'tomcat9'
          - java: '18'
            java-distro: 'temurin'
            maven_profile: 'tomcat9'
          - java: '25'
            java-distro: 'temurin'
            maven_profile: 'tomcat9'
          # Tomcat 10 (jakarta.servlet, Servlet 6.0) - compiler target 17
          - java: '18'
            java-distro: 'temurin'
            maven_profile: 'tomcat10'
          - java: '25'
            java-distro: 'temurin'
            maven_profile: 'tomcat10'
          # Tomcat 11 (jakarta.servlet, Servlet 6.1) - compiler target 21
          - java: '25'
            java-distro: 'temurin'
            maven_profile: 'tomcat11'

    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: "Set up JDK ${{ matrix.java }} (${{ matrix.java-distro }})"
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{ matrix.java }}
        distribution: ${{ matrix.java-distro }}
        cache: 'maven'

    - name: Setup Maven
      run: make deps-ci

    - name: Lint
      run: make lint PROFILE=${{ matrix.maven_profile }}

    - name: Build
      run: make build PROFILE=${{ matrix.maven_profile }}

    - name: Test
      run: make test PROFILE=${{ matrix.maven_profile }}
